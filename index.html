<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GeraMat</title>
<style>
body { font-family: Arial; padding:20px; }
.questao { margin-bottom:20px; }
.alt { margin-left:10px; }
</style>
</head>
<body>

<h1>GeraMat</h1>

<button onclick="gerarQuestoes()">Gerar Questões</button>
<button onclick="toggleGabarito()">Mostrar Gabarito</button>

<div id="questoes"></div>
<div id="gabarito" style="display:none;"></div>

<script>

let questoesGeradas = [];
let gabaritoVisivel = false;

function gerarQuestoes() {
  questoesGeradas = [];

  for (let i = 0; i < 5; i++) {
    questoesGeradas.push(gerarEquacao());
  }

  render();
}

function gerarEquacao() {
  const a = Math.floor(Math.random()*5)+1;
  const x = Math.floor(Math.random()*10)+1;
  const b = Math.floor(Math.random()*10);
  const c = a*x + b;

  const enunciado = `${a}x + ${b} = ${c}`;

  const resolucao = `
${a}x + ${b} = ${c}
${a}x = ${c} - ${b}
${a}x = ${c - b}
x = ${(c - b)/a}
`;

  const alternativas = [
    x,
    x+1,
    x-1,
    x+2
  ];

  return {
    enunciado,
    alternativas,
    gabarito: "A",
    resolucao
  };
}

function render() {
  const qDiv = document.getElementById("questoes");
  qDiv.innerHTML = "";

  questoesGeradas.forEach((q, i) => {
    qDiv.innerHTML += `
      <div class="questao">
        <strong>Questão ${i+1}</strong><br>
        ${q.enunciado}<br>
        ${q.alternativas.map((a,i)=> `<div class="alt">${String.fromCharCode(65+i)}) ${a}</div>`).join("")}
      </div>
    `;
  });

  const gDiv = document.getElementById("gabarito");

  gDiv.innerHTML = questoesGeradas.map((q,i)=>`
    <div style="margin-bottom:15px;">
      <strong>Questão ${i+1}</strong><br>
      Resposta: ${q.gabarito}<br>
      <strong>Resolução:</strong><br>
      ${q.resolucao}
    </div>
  `).join("");
}

function toggleGabarito() {
  const g = document.getElementById("gabarito");
  gabaritoVisivel = !gabaritoVisivel;
  g.style.display = gabaritoVisivel ? "block" : "none";
}

</script>

</body>
</html>
